<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UpneX · AI — AI Employees for Property Management</title>
  <meta name="description" content="Automate maintenance, leasing, tenant support, and back-office operations with AI employees built for property management companies." />
  <!-- Canonical target -->
  <link rel="canonical" href="https://upnexs.com/ai/" />
  <!-- Server-style redirect via meta refresh (Google treats 0-second refresh as 301-equivalent) -->
  <meta http-equiv="refresh" content="0; url=/ai/" />
  <!-- JS fallback that also preserves query string + hash (UTMs, gclid, fbclid, etc.) -->
  <script>
    (function () {
      var target = '/ai/' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(target);
    })();
  </script>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#0B0F19; color:#E5E7EB; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; }
    .box { min-height:100%; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px; }
    a { color:#2ED3B7; text-decoration:none; font-weight:600; }
    .spinner { width:32px; height:32px; margin:0 auto 20px; border:3px solid rgba(255,255,255,0.1); border-top-color:#2ED3B7; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    h1 { font-size:22px; font-weight:600; letter-spacing:-0.01em; margin:0 0 8px; }
    p { color:#9CA3AF; font-size:14px; margin:0; }
  </style>
</head>
<body>
  <div class="box">
    <div>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Redirecting to UpneX · AI…</h1>
      <p>If you are not redirected automatically, <a href="/ai/">click here</a>.</p>
    </div>
  </div>
</body>
</html>
